<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!--
      The build-time prerender script (scripts/prerender.mjs) injects
      route-specific <title>, <meta name="description">, OG, Twitter,
      canonical, hreflang and JSON-LD here for every route. The block
      below is the dev/HMR fallback; in production it's overwritten.
    -->
    <title>Travlys | Visa Assistance Services for Indian Travelers</title>
    <meta name="description" content="Travlys offers expert visa assistance for Indian citizens travelling to the USA, UK, Canada, Australia, Schengen, Singapore, UAE and more." />
    <meta name="author" content="Travlys" />
    <meta name="googlebot" content="index, follow" />

    <!-- Geo & Language (universal) -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    <meta http-equiv="content-language" content="en-IN" />

    <!-- Static OG/Twitter parts that don't change per page -->
    <meta property="og:site_name" content="Travlys" />
    <meta property="og:locale" content="en_IN" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@travlys" />
    <meta name="twitter:creator" content="@travlys" />

    <!-- Search engine ownership verification — replace the content="" with the
         token from each tool. Empty values are ignored, so safe to leave. -->
    <meta name="google-site-verification" content="" />
    <meta name="msvalidate.01" content="" />
    <meta name="yandex-verification" content="" />
    <meta name="p:domain_verify" content="" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#0b1e3f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Travlys" />
    <meta name="application-name" content="Travlys" />
    <meta name="format-detection" content="telephone=yes" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%favicon.svg" />

    <!-- Performance: preconnect, dns-prefetch, preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://wa.me" />
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&h=1080&fit=crop&q=80"
      fetchpriority="high"
    />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />

    <!-- SPA redirect handler — restores the path after 404.html bounces a deep link back here -->
    <script>
      (function () {
        var l = window.location;
        if (l.search.indexOf('?/') === 1) {
          var decoded = l.search.slice(2).split('&').map(function (s) { return s.replace(/~and~/g, '&') }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })();
    </script>

    <!-- Organization Schema (site-wide, identical on every page) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "@id": "https://travlys.com/#organization",
      "name": "Travlys",
      "alternateName": "Travlys Visa Assistance",
      "url": "https://travlys.com/",
      "logo": "https://travlys.com/favicon.svg",
      "image": "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&h=630&fit=crop&q=80",
      "description": "Travlys provides professional visa assistance for Indian citizens travelling worldwide, covering tourist, business, student and work visas with end-to-end documentation and interview support.",
      "telephone": "+91-8200918967",
      "email": "info@travlys.com",
      "priceRange": "₹₹",
      "areaServed": {
        "@type": "Country",
        "name": "India"
      },
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-8200918967",
        "contactType": "customer service",
        "email": "info@travlys.com",
        "areaServed": "IN",
        "availableLanguage": ["English", "Hindi"]
      },
      "sameAs": [
        "https://wa.me/918200918967"
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "bestRating": "5",
        "worstRating": "1",
        "ratingCount": "5000"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding:24px;font-family:sans-serif;text-align:center;">
        <h1>Travlys — Visa Assistance for Indian Travelers</h1>
        <p>Please enable JavaScript to use the Travlys website. For visa assistance, contact us at <a href="tel:+918200918967">+91 8200918967</a> or email <a href="mailto:info@travlys.com">info@travlys.com</a>.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
