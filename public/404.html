<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Travlys</title>
    <script>
      // SPA fallback for GitHub Pages — encode the requested path into a
      // query string and bounce to index.html, where it gets decoded.
      // Adapted from https://github.com/rafgraph/spa-github-pages (MIT)
      (function () {
        var pathSegmentsToKeep = 1; // /Travlys
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
